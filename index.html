<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>退傭試算 (Gemini版) | 魚多多TiNY POKER</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a; --card: #141414;
    --border: #2a2a2a; --gold: #c9a84c; --gold2: #f0d080; --gold-dim: #8a6f2e;
    --red: #e03030; --green: #2ecc71; --orange: #e87c2a;
    --text: #f0f0f0; --text2: #a0a0a0; --text3: #555;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; max-width: 430px; margin: 0 auto; min-height: 100vh; }
  .header { background: linear-gradient(160deg, #1c1100 0%, #0a0a0a 60%); padding: 18px 18px 14px; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:50; }
  .header-row { display:flex; justify-content:space-between; align-items:center; }
  .brand-group { display: flex; align-items: center; gap: 8px; }
  .brand { font-family:'Playfair Display',serif; font-size:20px; color:var(--gold); letter-spacing:2px; }
  .btn-settings { background: none; border: 1px solid var(--border); color: var(--text3); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
  .btn-import-header { display:flex; align-items:center; gap:6px; background: rgba(201,168,76,0.12); border: 1px solid var(--gold-dim); border-radius: 20px; padding: 7px 13px; font-size:12px; font-weight:600; color: var(--gold); cursor:pointer; white-space:nowrap; }
  .summary-strip { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .strip-item { background: var(--bg2); padding: 10px 14px; text-align: center; }
  .strip-label { font-size:9px; color:var(--text3); margin-bottom:4px; }
  .strip-val { font-size:14px; font-weight:700; }
  .strip-val.gold { color:var(--gold); }
  .strip-val.green { color:var(--green); }
  .player-row { border-bottom: 1px solid #1a1a1a; padding: 12px 18px; display:flex; align-items:center; gap:10px; }
  .player-nick { flex:1; min-width:0; }
  .nick-name { font-size:13px; font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .nick-id { font-size:10px; color:var(--text3); }
  .player-rate-wrap { display:flex; align-items:center; background: var(--bg3); border: 1px solid var(--border); border-radius:8px; padding:5px 8px; width:64px; }
  .player-rate-wrap input { background:none; border:none; outline:none; color:var(--gold2); font-size:14px; width:34px; text-align:center; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:300; align-items:flex-end; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--bg2); border:1px solid var(--border); border-radius:20px 20px 0 0; padding:20px 18px 32px; width:100%; max-width:430px; animation:slideUp 0.3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .key-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: var(--gold2); font-family: monospace; font-size: 13px; margin: 15px 0; outline: none; }
  .upload-zone { border: 2px dashed var(--border); border-radius:14px; padding:30px 20px; text-align:center; cursor:pointer; position:relative; }
  .img-preview { width:100%; border-radius:10px; margin:12px 0; display:none; max-height:220px; object-fit:contain; }
  .analyzing-wrap { text-align:center; padding:20px 0; display:none; }
  .spinner { width:32px; height:32px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--gold); animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .btn-apply { background: linear-gradient(135deg, var(--gold), var(--gold-dim)); border:none; border-radius:8px; padding: 12px; color:#111; font-size:14px; font-weight:700; cursor:pointer; }
  .total-bar { position:sticky; bottom:0; background: linear-gradient(0deg, #111 80%, transparent); padding: 16px 18px 24px; border-top: 1px solid var(--border); }
  .total-inner { background: var(--card); border: 1px solid var(--gold-dim); border-radius:14px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <div>
      <div class="brand-group"><div class="brand">♠ 退傭試算</div><button class="btn-settings" onclick="openKeyModal()">⚙️</button></div>
      <div class="period" id="periodLabel">尚未載入資料</div>
    </div>
    <button class="btn-import-header" onclick="openImport()">📷 導入圖片</button>
  </div>
</div>
<div class="summary-strip">
  <div class="strip-item"><div class="strip-label">總服務費</div><div class="strip-val gold" id="sumRake">—</div></div>
  <div class="strip-item"><div class="strip-label">總退傭</div><div class="strip-val green" id="sumPayout">—</div></div>
  <div class="strip-item"><div class="strip-label">玩家人數</div><div class="strip-val" id="sumCount">—</div></div>
</div>
<div id="playerContainer" style="padding-top:20px"><div style="text-align:center; color:var(--text3);">點擊齒輪設定 Gemini Key 後開始</div></div>
<div class="total-bar" id="totalBar" style="display:none">
  <div class="total-inner">
    <div><div style="font-size:12px;color:var(--text3)">應付總退傭</div><div style="font-size:24px;font-weight:700;color:var(--gold2)" id="grandTotal">$0</div></div>
    <div style="text-align:right"><div style="font-size:10px;color:var(--text3)">總服務費</div><div style="font-size:14px;color:var(--text2)" id="grandRake">$0</div></div>
  </div>
</div>
<div class="modal-overlay" id="keyModal" onclick="if(event.target===this) closeKeyModal()"><div class="modal">
    <div style="text-align:center; color:var(--gold); margin-bottom:10px;">Gemini API 設定</div>
    <input type="password" class="key-input" id="apiKeyInput" placeholder="請貼上 AI Studio 金鑰...">
    <button class="btn-apply" style="width:100%" onclick="saveApiKey()">儲存金鑰</button>
</div></div>
<div class="modal-overlay" id="importModal" onclick="if(event.target===this) closeImport()"><div class="modal">
    <div class="upload-zone"><input type="file" accept="image/*" onchange="handleFile(event)"><div>🖼️</div><div style="font-size:13px;color:var(--text2);">點擊上傳截圖</div></div>
    <img id="imgPreview" class="img-preview">
    <div id="analyzingWrap" class="analyzing-wrap"><div class="spinner"></div><div>Gemini 分析中...</div></div>
    <button id="btnConfirm" class="btn-apply" style="width:100%; display:none; margin-top:10px;" onclick="confirmImport()">確認導入</button>
</div></div>
<script>
let players = []; let rates = {}; let parsedPlayers = [];
function fmt(n) { return '$' + Math.round(n).toLocaleString(); }
function openKeyModal() { document.getElementById('apiKeyInput').value = localStorage.getItem('gemini_api_key') || ''; document.getElementById('keyModal').classList.add('show'); }
function closeKeyModal() { document.getElementById('keyModal').classList.remove('show'); }
function saveApiKey() { localStorage.setItem('gemini_api_key', document.getElementById('apiKeyInput').value.trim()); closeKeyModal(); }
function openImport() { if(!localStorage.getItem('gemini_api_key')) { openKeyModal(); return; } document.getElementById('importModal').classList.add('show'); }
function closeImport() { document.getElementById('importModal').classList.remove('show'); }
async function handleFile(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    document.getElementById('imgPreview').src = ev.target.result; document.getElementById('imgPreview').style.display = 'block';
    document.getElementById('analyzingWrap').style.display = 'block';
    await analyze(ev.target.result.split(',')[1], file.type);
  };
  reader.readAsDataURL(file);
}
async function analyze(base64, type) {
  const key = localStorage.getItem('gemini_api_key');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
  try {
    const res = await fetch(url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: "請識別圖中玩家ID、暱稱和服務費(rake)，回傳JSON: {\"players\": [{\"id\":\"\", \"nick\":\"\", \"rake\":0}]}" }, { inline_data: { mime_type: type, data: base64 } }] }] })
    });
    const data = await res.json();
    const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
    parsedPlayers = JSON.parse(text).players;
    document.getElementById('analyzingWrap').style.display = 'none'; document.getElementById('btnConfirm').style.display = 'block';
  } catch (e) { alert('分析出錯，請檢查 Key 是否為 Gemini Key'); document.getElementById('analyzingWrap').style.display = 'none'; }
}
function confirmImport() {
  players = parsedPlayers; players.forEach(p => rates[p.id] = 30);
  let html = ''; players.forEach(p => {
    html += `<div class="player-row"><div class="player-nick"><div class="nick-name">${p.nick}</div><div class="nick-id">${p.id}</div></div>
      <div style="text-align:right;width:70px;"><div style="font-size:12px;">${fmt(p.rake)}</div></div>
      <div class="player-rate-wrap"><input type="number" value="30" oninput="updateRate('${p.id}', this.value)">%</div>
      <div style="text-align:right;width:70px;color:var(--gold);font-weight:700" id="rb_${p.id}">${fmt(p.rake*0.3)}</div></div>`;
  });
  document.getElementById('playerContainer').innerHTML = html;
  document.getElementById('totalBar').style.display = 'block'; updateTotals(); closeImport();
}
function updateRate(id, v) { rates[id] = v; const p = players.find(x=>x.id===id); document.getElementById('rb_'+id).innerText = fmt(p.rake*v/100); updateTotals(); }
function updateTotals() {
  const r = players.reduce((s,p)=>s+p.rake, 0); const pay = players.reduce((s,p)=>s+(p.rake*(rates[p.id]||30)/100), 0);
  document.getElementById('sumRake').innerText = fmt(r); document.getElementById('sumPayout').innerText = fmt(pay);
  document.getElementById('sumCount').innerText = players.length;
  document.getElementById('grandTotal').innerText = fmt(pay); document.getElementById('grandRake').innerText = fmt(r);
}
</script>
</body>
</html>
